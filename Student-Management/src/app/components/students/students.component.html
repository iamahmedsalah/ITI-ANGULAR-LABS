<!-- students.component.html -->
<div class="page-container">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-0" style="color: var(--navy);">
        <i class="bi bi-people-fill me-2" style="color: var(--indigo);"></i>All Students
      </h2>
      <p class="text-muted small mb-0 mt-1">Manage and view all enrolled students</p>
    </div>
    <a routerLink="/add-student" class="btn btn-primary px-4">
      <i class="bi bi-person-plus-fill me-2"></i>Add Student
    </a>
  </div>

  <!-- Filters Card -->
  <div class="card mb-4">
    <div class="card-body py-3">
      <div class="row g-3 align-items-end">
        <div class="col-md-5">
          <label class="form-label fw-semibold small text-muted mb-1">
            <i class="bi bi-search me-1"></i>Search by Name
          </label>
          <input type="text" class="form-control"
                 placeholder="e.g. Ali Hassan"
                 [(ngModel)]="searchTerm" />
        </div>
        <div class="col-md-5">
          <label class="form-label fw-semibold small text-muted mb-1">
            <i class="bi bi-funnel me-1"></i>Filter by Department
          </label>
          <select class="form-select" [(ngModel)]="selectedDepartment">
            <option value="">All Departments</option>
            <option *ngFor="let dept of departments" [value]="dept">{{ dept }}</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-outline-secondary w-100" (click)="clearFilters()">
          <i class="bi bi-arrow-clockwise me-1"></i>Clear
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Table -->
  <ng-container *ngIf="students$ | async as students">
    <app-student-table
      [students]="students | filterStudents: searchTerm : selectedDepartment"
      (deleteStudent)="onDeleteStudent($event)">
    </app-student-table>
  </ng-container>

</div>
