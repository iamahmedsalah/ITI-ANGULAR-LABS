<div class="parent-container">
  <h2 class="parent-title">Parent Component</h2>

  <div class="form-group">
    <label>User Name</label>
    <input class="form-control" [(ngModel)]="newName" placeholder="Enter name" />
  </div>

  <div class="form-group">
    <label>Age</label>
    <input
      class="form-control"
      type="number"
      [(ngModel)]="newAge"
      placeholder="Enter age"
    />
  </div>

  <div class="form-group">
    <label>Email Address</label>
    <input class="form-control" [(ngModel)]="newEmail" placeholder="Enter email" />
  </div>

  <div class="actions">
    <button class="btn btn-primary" (click)="add()">Add User</button>
    <button class="btn btn-outline-danger" (click)="clearAll()">Clear All</button>
  </div>
</div>

<app-child></app-child>
