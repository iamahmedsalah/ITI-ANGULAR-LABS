<div class="child-container">
  <h2 class="child-title">Child Component</h2>

  <table class="custom-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Email</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let item of data$ | async">
        <td><span class="badge-id">#{{ item.id }}</span></td>
        <td style="font-weight: 600; color: #1e293b;">{{ item.name }}</td>
        <td>{{ item.age }} years</td>
        <td style="color: #3b82f6;">{{ item.email }}</td>
      </tr>
    </tbody>
  </table>
</div>
