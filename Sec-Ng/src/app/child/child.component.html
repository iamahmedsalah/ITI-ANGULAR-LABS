<div>
  <p>Child Component</p>

  <table class="table table-bordered">
    <thead class="rounded">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Email</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let item of data$ | async">
        <td>{{ item.id }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.age }}</td>
        <td>{{ item.email }}</td>
      </tr>
    </tbody>
  </table>
</div>
